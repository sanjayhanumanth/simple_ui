<!DOCTYPE html>
<html>
<head>
  <title>Lite UI</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:Arial;">
  
  <h2>🌟 Welcome</h2>

  <!-- Input -->
  <input type="text" id="nameInput" placeholder="Enter your name" style="padding:8px;">
  <button onclick="showGreeting()">Submit</button>

  <!-- Greeting -->
  <div id="greeting" style="margin-top:20px;"></div>

  <button onclick="clickMe()">Click Me</button>
  <p id="msg"></p>

  <script>
    let userName = "";

    function showGreeting() {
      userName = document.getElementById("nameInput").value;

      if (userName.trim() === "") {
        alert("Please enter your name");
        return;
      }

      document.getElementById("greeting").innerHTML =
        `<h3>Hi ${userName} 👋</h3>
         <p>Hope you're doing great today 😊</p>`;
    }

    // 🎲 Random messages
    const messages = [
      "Keep smiling, {name}! 😊",
      "You're doing amazing, {name}! 🚀",
      "Have a fantastic day, {name}! 🌟",
      "Stay positive, {name}! 💪",
      "Great things are coming your way, {name}! ✨"
    ];

    function clickMe() {
      if (userName === "") {
        document.getElementById("msg").innerText = "Enter your name first 🙂";
        return;
      }

      // Pick random message
      const randomIndex = Math.floor(Math.random() * messages.length);
      let message = messages[randomIndex];

      // Replace {name} with actual name
      message = message.replace("{name}", userName);

      document.getElementById("msg").innerText = message;
    }
  </script>

</body>
</html>
